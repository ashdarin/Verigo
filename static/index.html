<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>Verigo</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/" aria-label="Verigo 首页">
      <span class="brand-mark">V</span>
      <span>Verigo</span>
    </a>
    <nav class="product-nav" aria-label="产品导航">
      <button class="nav-item active" type="button" data-view="verify">邮箱验证</button>
      <button class="nav-item" type="button" data-view="discovery">查找工作邮箱</button>
    </nav>
    <div class="account-area">
      <span class="service-state"><span class="state-dot"></span>运行中</span>
      <button id="account-button" class="account-button" type="button">登录</button>
      <div id="account-menu" class="account-menu hidden">
        <strong id="account-name"></strong>
        <small id="account-credits" class="account-credits"></small>
        <button id="verify-email-button" type="button">验证邮箱并领取 100 额度</button>
        <button id="logout-button" type="button">退出登录</button>
      </div>
    </div>
  </header>

  <main id="verify-workspace" class="workspace">
    <aside class="control-panel">
      <div class="panel-heading">
        <div>
          <p class="eyebrow">验证任务</p>
          <h1>收件地址检查</h1>
        </div>
        <span id="email-count" class="count">0</span>
      </div>

      <div class="segmented" role="tablist" aria-label="输入方式">
        <button class="segment active" data-mode="paste" role="tab" aria-selected="true">批量输入</button>
        <button class="segment" data-mode="file" role="tab" aria-selected="false">文件导入</button>
      </div>

      <section id="paste-panel" class="input-mode">
        <label for="email-input">邮箱列表</label>
        <textarea id="email-input" rows="11" placeholder="name@example.com&#10;hello@company.cn" spellcheck="false"></textarea>
      </section>

      <section id="file-panel" class="input-mode hidden">
        <label for="file-input">导入数据</label>
        <label id="file-dropzone" class="file-dropzone" for="file-input">
          <input id="file-input" type="file" accept=".txt,.csv,.json,.xlsx,.xlsm,.xls">
          <span class="file-symbol">↑</span>
          <strong id="file-title">选择文件</strong>
          <small id="file-meta">TXT · CSV · JSON · XLSX · XLSM · XLS</small>
        </label>
      </section>

      <fieldset class="speed-control">
        <legend>验证速度</legend>
        <div class="speed-options">
          <label><input type="radio" name="speed" value="1"><span>稳定</span></label>
          <label><input type="radio" name="speed" value="2" checked><span>标准</span></label>
          <label><input type="radio" name="speed" value="4"><span>快速</span></label>
          <label><input type="radio" name="speed" value="8"><span>极速</span></label>
        </div>
      </fieldset>

      <button id="start-button" class="primary-action" type="button">开始验证</button>
      <p id="form-error" class="form-error" role="alert"></p>

      <section id="recent-block" class="recent-block hidden">
        <div class="field-row">
          <h2>最近任务</h2>
          <button id="refresh-jobs" class="icon-button" type="button" title="刷新" aria-label="刷新任务">↻</button>
        </div>
        <div id="recent-jobs" class="recent-jobs"></div>
      </section>
    </aside>

    <section class="results-panel">
      <div class="results-header">
        <div>
          <p class="eyebrow">任务工作台</p>
          <h2 id="job-title">等待任务</h2>
        </div>
        <div class="job-state"><span id="job-mode" class="mode-badge hidden"></span><span id="job-status" class="status status-idle">未开始</span></div>
      </div>

      <section class="progress-section" aria-live="polite">
        <div class="progress-meta">
          <span id="progress-copy">0 / 0 已处理</span>
          <strong id="progress-percent">0%</strong>
        </div>
        <div class="progress-track"><div id="progress-bar" class="progress-bar"></div></div>
      </section>

      <section id="summary" class="summary-grid" aria-label="结果摘要">
        <div class="metric"><span>已出结果</span><strong data-key="total">0</strong></div>
        <div class="metric metric-good"><span>可投递</span><strong data-key="deliverable">0</strong></div>
        <div class="metric metric-bad"><span>不可投递</span><strong data-key="undeliverable">0</strong></div>
        <div class="metric metric-warn"><span>待确认</span><strong data-key="unknown">0</strong></div>
        <div class="metric"><span>Catch-all</span><strong data-key="catch_all">0</strong></div>
      </section>

      <div class="table-toolbar">
        <div class="filters">
          <input id="result-search" type="search" placeholder="搜索邮箱">
          <select id="result-filter" aria-label="筛选验证状态">
            <option value="all">全部结果</option>
            <option value="deliverable">可投递</option>
            <option value="undeliverable">不可投递</option>
            <option value="unknown">待确认</option>
          </select>
        </div>
        <button id="download-button" class="download-action" type="button" disabled>下载 CSV</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead><tr><th>邮箱</th><th>结果</th><th>域名类型</th><th>验证方式</th><th>服务器响应</th></tr></thead>
          <tbody id="results-body">
            <tr class="empty-row"><td colspan="5">尚无验证结果</td></tr>
          </tbody>
        </table>
      </div>
      <div class="pagination" aria-label="结果分页">
        <span id="results-page-info">等待验证结果</span>
        <div>
          <button id="previous-page" class="page-button" type="button" disabled>上一页</button>
          <button id="next-page" class="page-button" type="button" disabled>下一页</button>
        </div>
      </div>
    </section>
  </main>

  <main id="discovery-workspace" class="discovery-workspace hidden">
    <section class="discovery-form-area">
      <p class="eyebrow">工作邮箱查找</p>
      <h1>按姓名查找工作邮箱</h1>
      <div class="discovery-fields">
        <label>名字<input id="discovery-first-name" autocomplete="given-name" placeholder="ming"></label>
        <label>姓氏<input id="discovery-last-name" autocomplete="family-name" placeholder="wang"></label>
      </div>
      <label for="discovery-domain">公司域名<input id="discovery-domain" inputmode="url" placeholder="company.com"></label>
      <label class="discovery-stop"><input id="discovery-stop-on-match" type="checkbox" checked><span>找到可投递邮箱后停止后续验证</span></label>
      <button id="discovery-start" class="primary-action" type="button">查找并验证</button>
      <p id="discovery-error" class="form-error" role="alert"></p>
      <div id="discovery-candidates" class="candidate-list hidden"></div>
    </section>
    <section class="discovery-results-area">
      <div class="results-header">
        <div><p class="eyebrow">查找结果</p><h2 id="discovery-title">等待查找</h2></div>
        <span id="discovery-status" class="status status-idle">未开始</span>
      </div>
      <section class="progress-section" aria-live="polite">
        <div class="progress-meta"><span id="discovery-progress-copy">0 / 0 已处理</span><strong id="discovery-progress-percent">0%</strong></div>
        <div class="progress-track"><div id="discovery-progress-bar" class="progress-bar"></div></div>
      </section>
      <p id="discovery-verdict" class="discovery-verdict">请输入姓名和公司域名</p>
      <div class="table-wrap">
        <table>
          <thead><tr><th>候选邮箱</th><th>结果</th><th>验证方式</th><th>服务器响应</th></tr></thead>
          <tbody id="discovery-results-body"><tr class="empty-row"><td colspan="4">尚无查找结果</td></tr></tbody>
        </table>
      </div>
    </section>
  </main>

  <dialog id="auth-dialog" class="auth-dialog">
    <form id="auth-form" method="dialog">
      <div class="dialog-heading">
        <div><p class="eyebrow">Verigo 账户</p><h2 id="auth-title">登录</h2></div>
        <button id="close-auth" class="dialog-close" type="button" aria-label="关闭">×</button>
      </div>
      <div class="segmented auth-tabs">
        <button class="segment active" data-auth-mode="login" type="button">登录</button>
        <button class="segment" data-auth-mode="register" type="button">注册</button>
      </div>
      <label for="auth-email">邮箱</label>
      <input id="auth-email" name="email" type="email" autocomplete="email" required>
      <label for="auth-password">密码</label>
      <input id="auth-password" name="password" type="password" autocomplete="current-password" minlength="6" maxlength="128" required>
      <button id="open-reset" class="text-action" type="button">忘记密码？</button>
      <p id="auth-error" class="form-error" role="alert"></p>
      <button id="auth-submit" class="primary-action" type="submit">登录</button>
    </form>
  </dialog>

  <dialog id="reset-dialog" class="auth-dialog">
    <form id="reset-request-form" method="dialog">
      <div class="dialog-heading"><div><p class="eyebrow">找回密码</p><h2>验证注册邮箱</h2></div><button id="close-reset" class="dialog-close" type="button" aria-label="关闭">×</button></div>
      <label for="reset-email">注册邮箱</label>
      <input id="reset-email" type="email" autocomplete="email" required>
      <p id="reset-error" class="form-error" role="alert"></p>
      <button class="primary-action" type="submit">发送验证码</button>
    </form>
    <form id="reset-confirm-form" method="dialog" class="hidden">
      <div class="dialog-heading"><div><p class="eyebrow">找回密码</p><h2>设置新密码</h2></div><button class="dialog-close" type="button" data-close-reset aria-label="关闭">×</button></div>
      <label for="reset-code">邮箱验证码</label>
      <input id="reset-code" inputmode="numeric" autocomplete="one-time-code" pattern="[0-9]{6}" maxlength="6" required>
      <label for="reset-password">新密码</label>
      <input id="reset-password" type="password" autocomplete="new-password" minlength="6" maxlength="128" required>
      <p id="reset-confirm-error" class="form-error" role="alert"></p>
      <button class="primary-action" type="submit">更新密码</button>
    </form>
  </dialog>

  <script src="/static/js/app.js" defer></script>
</body>
</html>
